name: mobile
description: "Sistema de Información de Registro Ciudadano - Mobile"
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Base de datos local (Drift)
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Utilidades de Red y HTTP
  dio: ^5.5.0
  connectivity_plus: ^6.0.3

  # Criptografía y Almacenamiento Key-Value
  bcrypt: ^1.1.3
  shared_preferences: ^2.2.3
  uuid: ^4.3.3
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

  # Generación de código para Drift
  drift_dev: ^2.20.0
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/logo.png"
  web:
    generate: true
    image_path: "assets/icon/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/logo.png

